name: Salesforce Validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'force-app/**'

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Verify Salesforce CLI
        run: sf version

      - name: Install Git Delta Plugin
        run: |
          echo y | sf plugins install sfdx-git-delta

      - name: Create JWT Key File
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --client-id ${{ secrets.SF_CONSUMER_KEY }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias TargetOrg

      - name: Verify Authentication
        run: |
          sf org display --target-org TargetOrg

      - name: Generate Delta Package
        run: |
          mkdir changed-sources

          sf sgd source delta \
            --to HEAD \
            --from origin/master \
            --output changed-sources \
            --generate-delta \
            --source force-app

      - name: Validate Deployment
        run: |
          if [ ! -d changed-sources/force-app ]; then
            echo "No metadata changes detected under force-app — skipping validation."
            exit 0
          fi

          TEST_CLASSES=$(find force-app -type f -name "*Test.cls" -exec basename {} .cls \; | paste -sd ',' -)

          if [ -z "$TEST_CLASSES" ]; then
            echo "No Apex test classes found in repo — validating without running tests."
            sf project deploy validate \
              --source-dir changed-sources/force-app \
              --target-org TargetOrg \
              --test-level NoTestRun \
              --wait 60
          else
            echo "Running tests: $TEST_CLASSES"
            sf project deploy validate \
              --source-dir changed-sources/force-app \
              --target-org TargetOrg \
              --test-level RunSpecifiedTests \
              --tests "$TEST_CLASSES" \
              --wait 60
          fi

      - name: Delete JWT Key
        if: always()
        run: rm server.key